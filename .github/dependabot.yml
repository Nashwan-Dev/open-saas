version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "direct"
    # Enable security updates for npm
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "npm"
    directory: "/template/app"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "npm"
    directory: "/opensaas-sh/blog"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "chore(deps)"

# Optional: ignore common noisy updates
ignores:
  - dependency-name: "prettier"
    update-types:
      - "version-update:semver-patch"
      - "version-update:semver-minor"
